server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./library.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1        # SQLite 单写者，连接池设为 1
      connection-init-sql: "PRAGMA foreign_keys = ON"  # 启用外键约束
  sql:
    init:
      mode: always                # 启动时执行 schema.sql（CREATE TABLE IF NOT EXISTS 保证幂等）
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.library: DEBUG
    com.library.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
